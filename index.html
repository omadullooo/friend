<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise! ✨</title>
    <style>
        :root {
            --bg-color: #fff5f7;
            --card-bg: #ffffff;
            --text-color: #4a4a4a;
            --primary-pink: #ff6b8b;
            --hover-pink: #ff477e;
            --shadow: rgba(255, 107, 139, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .heart-bg {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            animation: floatUp 6s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
            max-width: 480px;
            width: 90%;
            z-index: 10;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 107, 139, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            line-height: 1.4;
            color: #333;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 1.5rem;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, all 0.2s ease;
        }

        .btn-yes {
            background-color: var(--primary-pink);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 139, 0.4);
            z-index: 10;
        }

        .btn-yes:hover {
            background-color: var(--hover-pink);
            transform: scale(1.05);
        }

        .btn-no {
            background-color: #f0f0f0;
            color: #777;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid #ffe3e8;
            border-radius: 12px;
            background: white;
            color: var(--text-color);
            outline: none;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary-pink);
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .final-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>

    <div class="heart-bg" style="left: 10%; animation-delay: 0s;">💖</div>
    <div class="heart-bg" style="left: 25%; animation-delay: 2s;">✨</div>
    <div class="heart-bg" style="left: 70%; animation-delay: 1s;">🌸</div>
    <div class="heart-bg" style="left: 85%; animation-delay: 3s;">💝</div>

    <div class="container">
        <!-- STEP 1: The Best Friend Question (Runaway Button) -->
        <div id="step1" class="step active">
            <h1>Am I your best friend? 👀</h1>
            <div class="btn-container">
                <button class="btn-yes" onclick="nextStep(2)">Yes!</button>
                <button class="btn-no" id="runaway-btn">No</button>
            </div>
        </div>

        <!-- STEP 2: The Humor/Guilt Trip Question (Shrinking Button) -->
        <div id="step2" class="step">
            <h1>Do you agree that I have the absolute best sense of humor? 🧠✨</h1>
            <div class="btn-container">
                <button class="btn-yes" id="grow-btn-step2" onclick="nextStep(3)">Totally true</button>
                <button class="btn-no" id="shrink-btn" onclick="shrinkNoButton()">Nah</button>
            </div>
        </div>

        <!-- STEP 3: The Meeting Question (Standard Confirmation) -->
        <div id="step3" class="step">
            <h1>Are you going to meet with me? 🥺</h1>
            <div class="btn-container">
                <button class="btn-yes" onclick="nextStep(4)">Yes, of course!</button>
            </div>
        </div>

        <!-- STEP 4: Date Picker -->
        <div id="step4" class="step">
            <h1>Yay! 🎉 When are we meeting? Pick a day:</h1>
            <select id="date-select"></select>
            <button class="btn-yes" onclick="finishSurprise()">Confirm Time ✨</button>
        </div>

        <!-- STEP 5: Final Screen -->
        <div id="step5" class="step">
            <span class="final-emoji">🥳🎉</span>
            <h1 id="final-message">See you then!</h1>
        </div>
    </div>

    <script>
        // --- STEP 1: RUNAWAY NO BUTTON LOGIC ---
        const noBtn = document.getElementById('runaway-btn');

        function moveButton() {
            const btnRect = noBtn.getBoundingClientRect();
            const padding = 60;
            const maxX = window.innerWidth - btnRect.width - padding;
            const maxY = window.innerHeight - btnRect.height - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // --- STEP 2: SHRINKING NO BUTTON LOGIC ---
        let noClickCount = 0;
        const shrinkBtn = document.getElementById('shrink-btn');
        const growBtn2 = document.getElementById('grow-btn-step2');
        
        const funnyResponses = [
            "Are you sure? 🤔",
            "Try clicking it again... if you can see it 🔍",
            "Wow, rude! Click the big button already! 😤"
        ];

        function shrinkNoButton() {
            noClickCount++;
            
            // Shrink the NO button
            let currentScale = 1 - (noClickCount * 0.25);
            shrinkBtn.style.transform = `scale(${Math.max(currentScale, 0.2)})`;
            
            // Grow the YES button
            let yesScale = 1 + (noClickCount * 0.3);
            growBtn2.style.transform = `scale(${yesScale})`;

            // Update the text dynamically to make it funny
            if (noClickCount <= funnyResponses.length) {
                shrinkBtn.innerText = funnyResponses[noClickCount - 1];
            }
            
            // If they somehow manage to click it 4 times, automatically move them forward anyway
            if (noClickCount >= 4) {
                nextStep(3);
            }
        }

        // --- NAVIGATION LOGIC ---
        function nextStep(stepNumber) {
            // Reset fixed position of runaway button if it was moved
            noBtn.style.position = 'relative';
            noBtn.style.left = '0';
            noBtn.style.top = '0';

            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(`step${stepNumber}`).classList.add('active');

            if (stepNumber === 4) {
                populateDates();
            }
        }

        function populateDates() {
            const select = document.getElementById('date-select');
            select.innerHTML = '';
            const options = { weekday: 'long', month: 'short', day: 'numeric' };

            for (let i = 1; i <= 5; i++) {
                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + i);
                
                const optionText = nextDate.toLocaleDateString('en-US', options);
                const option = document.createElement('option');
                option.value = optionText;
                option.textContent = optionText;
                select.appendChild(option);
            }
        }

        function finishSurprise() {
            const selectedTime = document.getElementById('date-select').value;
            document.getElementById('final-message').innerText = `Awesome! See you on ${selectedTime}! 💕`;
            nextStep(5);
        }
    </script>
</body>
</html>
